# Redirect alternative domains to main domain
server {
    listen 80;
    listen [::]:80;
    server_name gapta.rivne.ua gapta.rv.ua;

    return 301 https://gapta.com.ua$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gapta.rivne.ua gapta.rv.ua;

    ssl_certificate /etc/letsencrypt/live/gapta.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gapta.com.ua/privkey.pem;

    return 301 https://gapta.com.ua$request_uri;
}

# Main domain — gapta.com.ua
server {
    listen 80;
    listen [::]:80;
    server_name gapta.com.ua;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gapta.com.ua;

    ssl_certificate /etc/letsencrypt/live/gapta.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gapta.com.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/gapta.com.ua;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML — no cache (for instant updates after deploy)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA-like fallback for Astro
    location / {
        try_files $uri $uri/ $uri.html /index.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
